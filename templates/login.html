<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KeyWatch — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #0d0f12;
  --surface:   #13161b;
  --surface2:  #1a1e25;
  --border:    #232830;
  --border2:   #2d3340;
  --accent:    #4f8ef7;
  --accent-dim:#2a4a8a;
  --accent-glow: rgba(79,142,247,0.18);
  --text:      #e8eaf0;
  --text-dim:  #6b7280;
  --text-mid:  #9ca3af;
  --danger:    #f87171;
  --success:   #34d399;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Subtle animated gradient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(79,142,247,0.07) 0%, transparent 70%);
  top: -150px; left: -100px;
  animation: orbDrift 18s ease-in-out infinite;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(52,211,153,0.05) 0%, transparent 70%);
  bottom: -100px; right: -50px;
  animation: orbDrift 22s ease-in-out infinite reverse;
}
@keyframes orbDrift {
  0%,100% { transform: translate(0,0); }
  33%      { transform: translate(40px,30px); }
  66%      { transform: translate(-20px,50px); }
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.3;
  z-index: 0;
  pointer-events: none;
}

/* Card */
.card {
  position: relative; z-index: 10;
  width: 420px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 40px 36px 36px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 24px 64px rgba(0,0,0,0.5),
    0 0 80px rgba(79,142,247,0.04);
  animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top indicator */
.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  animation: dotPulse 2.5s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { opacity: 1; box-shadow: 0 0 8px var(--success); }
  50%      { opacity: 0.5; box-shadow: 0 0 4px var(--success); }
}

.status-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Icon */
.lock-icon {
  width: 52px; height: 52px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-size: 22px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
  color: var(--text);
}

.subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.5;
}

/* Form */
.field { margin-bottom: 16px; }

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  opacity: 0.4;
  pointer-events: none;
}

input[type="password"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 12px 14px 12px 42px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 3px;
}

input[type="password"]::placeholder {
  color: var(--text-dim);
  letter-spacing: 1px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
}

input[type="password"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Error */
.error {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--danger);
  margin-bottom: 16px;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}

/* Button */
button[type="submit"] {
  width: 100%;
  background: var(--accent);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  border: none;
  border-radius: 10px;
  padding: 13px;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  position: relative;
  overflow: hidden;
}

button[type="submit"]::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
  border-radius: 10px;
}

button[type="submit"]:hover {
  opacity: 0.9;
  box-shadow: 0 6px 24px rgba(79,142,247,0.45);
}
button[type="submit"]:active { transform: scale(0.98); }

/* Footer */
.card-footer {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
}

.footer-badge span { font-size: 13px; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="card-top">
    <div class="status-dot"></div>
    <span class="status-label">Server Online</span>
  </div>

  <div class="lock-icon">🔐</div>
  <h1>KeyWatch</h1>
  <p class="subtitle">Enter your access key to view the live dashboard.</p>

  <form method="POST">
    {% if error %}
    <div class="error">
      <span>⚠</span> Incorrect password. Try again.
    </div>
    {% endif %}

    <div class="field">
      <label for="password">Access Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" autofocus autocomplete="off"/>
      </div>
    </div>

    <button type="submit">Sign In →</button>
  </form>

  <div class="card-footer">
    <div class="footer-badge"><span>🛡</span> End-to-end encrypted</div>
    <div class="footer-badge"><span>🔒</span> Session secured</div>
  </div>
</div>

</body>
</html>
